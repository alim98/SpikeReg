# ============================================
# SpikeReg — Fixed Configuration
# Implements all Phase 0-3 roadmap fixes:
#   - Full-volume 128³ training (not 32³ patches)
#   - Reduced channels [16,32,64,128] to fit on GPU
#   - T=4 time steps (not 10) — best accuracy/efficiency tradeoff
#   - Single-pass prediction (num_iterations=1)
#   - NCC + diffusion regularization for pretrain
#   - Direct current injection (no Poisson noise during training)
# ============================================

# -------- Model architecture --------
model:
  in_channels: 2                   # Fixed + Moving concatenated

  # Reduced channel counts to fit 128³ volumes on GPU (roadmap Step 0.1)
  encoder_channels: [16, 32, 64, 128]
  decoder_channels: [64, 32, 16, 16]

  # T=4 time steps — best Dice/energy tradeoff (roadmap Step 2.3)
  encoder_time_windows: [4, 4, 4, 4]
  decoder_time_windows: [4, 4, 4, 4]
  input_time_window: 4

  # LIF dynamics
  encoder_tau_u: [0.9, 0.85, 0.8, 0.75]
  decoder_tau_u: [0.75, 0.8, 0.85, 0.9]

  # Skip strategy (must match decoder_channels above)
  skip_merge: ["concatenate", "concatenate", "average", "none"]

  # Poisson encoding: disabled during training (roadmap Fix 2)
  # Set to true only for neuromorphic hardware inference
  use_poisson_encoding: false

  displacement_scale: 1.0
  smooth_output_projection: true
  learnable_output_smoothing: true

# -------- Training configuration --------
training:
  pretrain: true
  pretrain_epochs: 300             # ANN warm-start: target Dice >= 0.74
  finetune_epochs: 100             # SNN fine-tune with surrogate gradients

  # Single-pass prediction — no iterative loop during training (roadmap Fix 4)
  num_iterations: 1
  early_stop_threshold: 0.001

  # Optimizers
  optimizer:
    type: "adam"
    lr: 0.0001                     # ANN warm-start: 1e-4
    weight_decay: 0.0
    betas: [0.9, 0.999]
    eps: 1.0e-8
  optimizer_finetune:
    type: "adam"
    lr: 0.00005                    # SNN fine-tune: 5e-5 (lower for surrogate)
    weight_decay: 0.0
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    type: "cosine"
    T_max: 300
    eta_min: 1.0e-6
  scheduler_finetune:
    type: "cosine"
    T_max: 100
    eta_min: 1.0e-6

  # Loss — NCC + diffusion reg for both pretrain and finetune (roadmap Fix 1)
  loss:
    similarity_type: "ncc"
    similarity_weight: 1.0
    ncc_win: 9

    regularization_type: "diffusion"
    regularization_weight: 1.0     # λ=1.0 for pretrain (roadmap Step 0.2)

    # Spike activity shaping (only active in finetune via SpikeRegLoss)
    spike_weight: 0.0001
    spike_balance_weight: 0.01
    target_spike_rate: 0.1         # target 5-15% spike rate

  # Full-volume training: batch_size=1-2 for 128³ on 40GB A100
  batch_size: 1
  gradient_clip: 1.0
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2

  checkpoint_interval: 10
  val_every_epochs: 1
  save_keep_last: 5

# -------- ANN to SNN conversion --------
conversion:
  threshold_percentile: 99.5       # calibrate per-layer v_th from activation percentile
  calibration_samples: 50          # number of calibration batches

# -------- Inference configuration --------
inference:
  patch_size: 128
  patch_stride: 64
  batch_size: 1
  smooth_displacement: true

# -------- Data configuration --------
data:
  percentile_clip: [2, 98]

  # Full-volume mode: resample to target shape and return whole volume (roadmap Step 0.1)
  # Native L2R OASIS shape is [160, 192, 224]; use 128³ to fit on GPU with reduced channels
  full_volume: true
  resample_size: [128, 128, 128]
  num_steps: 1000                  # random pairs sampled per training epoch

  val_split: 0.2
  debug_percent: 100.0

  # L2R Task 3 (OASIS) paths
  train_dir: "/u/almik/SpikeReg2/data/L2R_2021_Task3_train"
  val_dir:   "/u/almik/SpikeReg2/data/L2R_2021_Task3_val"
  test_dir:  "/u/almik/SpikeReg2/data/L2R_2021_Task3_val"

# -------- Multi-GPU configuration --------
multi_gpu:
  use_multi_gpu: true
  gpu_ids: [0, 1, 2, 3]
  distributed: true

# -------- Neuromorphic deployment --------
neuromorphic:
  weight_bits: 8
  threshold_bits: 8
  cores_per_layer: 4
  max_spikes_per_core: 1000
  dt: 1.0
